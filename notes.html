<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanti | Secure Cloud Engine</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 32px;
            border: 1px solid white;
            box-shadow: 0 20px 60px rgba(0,0,0,0.06);
            width: 90%;
            max-width: 400px;
            padding: 3rem;
            text-align: center;
        }
        .avanti-btn {
            background-color: #3f72af;
            transition: all 0.2s ease;
        }
        .avanti-btn:active { transform: scale(0.97); }
        .token-area {
            background: rgba(0,0,0,0.03);
            font-family: monospace;
            word-break: break-all;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="w-16 h-16 bg-[#3f72af] rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-1">Avanti Cloud</h1>
        <p class="text-[10px] text-gray-400 font-bold uppercase tracking-[0.2em] mb-8">Secure Dispatch System</p>

        <div class="space-y-4">
            <input type="text" id="notif-input" placeholder="Message content..." 
                class="w-full px-5 py-4 rounded-2xl bg-gray-100 border-none outline-none focus:ring-2 focus:ring-[#3f72af] text-gray-800">
            
            <button id="send-btn" class="avanti-btn w-full py-4 rounded-2xl text-white font-bold shadow-lg">
                Dispatch Notification
            </button>
        </div>

        <div id="status" class="mt-8 text-[11px] font-black text-gray-400 uppercase tracking-widest">
            Ready to Connect
        </div>

        <div id="token-display" class="hidden mt-6 p-3 rounded-xl token-area text-[9px] text-gray-500">
            Fetching Device Token...
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getMessaging, getToken } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-messaging.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAw7L6TJtF1W0PwfStEJUC4CebUyMdQU9w",
            authDomain: "users-66be4.firebaseapp.com",
            projectId: "users-66be4",
            storageBucket: "users-66be4.firebasestorage.app",
            messagingSenderId: "776585122050",
            appId: "1:776585122050:web:3f452a1f16dc36ee1ef21b"
        };

        const app = initializeApp(firebaseConfig);
        const messaging = getMessaging(app);

        const btn = document.getElementById('send-btn');
        const status = document.getElementById('status');
        const tokenArea = document.getElementById('token-display');

        btn.addEventListener('click', async () => {
            const msg = document.getElementById('notif-input').value;
            if (!msg) return;

            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                // 1. Send local visual feedback
                new Notification("Avanti Intelligence", { body: msg });

                // 2. Fetch the actual Cloud Token (This is what you use to send remotely)
                try {
                    const currentToken = await getToken(messaging, { 
                        vapidKey: 'PASTE_YOUR_PUBLIC_VAPID_KEY_HERE' 
                    });
                    
                    if (currentToken) {
                        tokenArea.classList.remove('hidden');
                        tokenArea.innerText = "Device Token: " + currentToken;
                        status.innerText = "CLOUD TOKEN SYNCED";
                        status.style.color = "#34c759";
                    }
                } catch (err) {
                    console.log('Token error:', err);
                    status.innerText = "LOCAL DISPATCH ONLY";
                }
            }
        });
    </script>
</body>
</html>

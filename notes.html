<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Messenger | Secure SMS Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #f5f5f7;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }
        .btn-primary {
            background-color: #3f72af; /* Avanti Blue */
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            background-color: #305a8a;
            transform: translateY(-1px);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-6">

    <div class="glass-card w-full max-w-md p-8">
        <header class="mb-8 text-center">
            <h1 class="text-2xl font-semibold text-gray-800">Direct SMS</h1>
            <p class="text-sm text-gray-500">Send instant messages via Textbelt</p>
        </header>

        <form id="smsForm" class="space-y-6">
            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Recipient Number</label>
                <input type="tel" id="phone" placeholder="+260..." required
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all">
                <p class="text-[10px] text-gray-400 mt-1">Include country code (e.g., +260)</p>
            </div>

            <div>
                <label class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-2">Message</label>
                <textarea id="message" rows="4" placeholder="Type your message here..." required
                    class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 focus:outline-none transition-all resize-none"></textarea>
            </div>

            <button type="submit" id="sendBtn"
                class="w-full btn-primary text-white font-semibold py-3 rounded-xl shadow-lg flex items-center justify-center space-x-2">
                <span>Send Message</span>
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm hidden p-3 rounded-lg"></div>
    </div>

    <script>
        const smsForm = document.getElementById('smsForm');
        const statusDiv = document.getElementById('status');
        const sendBtn = document.getElementById('sendBtn');

        smsForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const phone = document.getElementById('phone').value;
            const message = document.getElementById('message').value;

            // Reset UI
            statusDiv.classList.add('hidden');
            sendBtn.disabled = true;
            sendBtn.innerHTML = 'Sending...';

            try {
                const response = await fetch('https://textbelt.com/text', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        phone: phone,
                        message: message,
                        key: 'textbelt', // Using the public free key
                    }),
                });

                const data = await response.json();

                statusDiv.classList.remove('hidden');
                if (data.success) {
                    statusDiv.className = "mt-6 text-center text-sm p-3 rounded-lg bg-green-100 text-green-700";
                    statusDiv.innerText = "✓ Message sent successfully!";
                    smsForm.reset();
                } else {
                    statusDiv.className = "mt-6 text-center text-sm p-3 rounded-lg bg-red-100 text-red-700";
                    statusDiv.innerText = `Error: ${data.error}`;
                }
            } catch (error) {
                statusDiv.classList.remove('hidden');
                statusDiv.className = "mt-6 text-center text-sm p-3 rounded-lg bg-red-100 text-red-700";
                statusDiv.innerText = "Connection failed. Please try again.";
            } finally {
                sendBtn.disabled = false;
                sendBtn.innerHTML = 'Send Message';
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanti | Claymore Push Engine</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'SF Pro Display', -apple-system, sans-serif;
            background-color: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .btn-avanti {
            background-color: #3f72af;
            transition: all 0.3s ease;
        }
        .btn-avanti:active { transform: scale(0.95); }
        .btn-disabled { background-color: #a0aec0; cursor: not-allowed; }
        
        /* Pulse animation for the permission state */
        .pulse { animation: pulse-blue 2s infinite; }
        @keyframes pulse-blue {
            0% { box-shadow: 0 0 0 0 rgba(63, 114, 175, 0.4); }
            70% { box-shadow: 0 0 0 10px rgba(63, 114, 175, 0); }
            100% { box-shadow: 0 0 0 0 rgba(63, 114, 175, 0); }
        }
    </style>
</head>
<body>

    <div class="glass-card text-center">
        <div class="mb-6">
            <div id="icon-bg" class="w-16 h-16 bg-[#3f72af] rounded-2xl mx-auto flex items-center justify-center shadow-lg transition-colors duration-500">
                <svg id="bell-icon" xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-1">Push Engine</h1>
        <p id="status-text" class="text-[10px] text-orange-500 font-bold uppercase tracking-widest mb-8">Activation Required</p>

        <div class="space-y-4">
            <input type="text" id="push-message" placeholder="Enter notification text..." 
                class="w-full px-5 py-4 rounded-2xl bg-gray-100 border-none focus:ring-2 focus:ring-[#3f72af] outline-none text-gray-800 transition-all">
            
            <button onclick="handleEngine()" id="main-btn" class="btn-avanti w-full py-4 rounded-2xl text-white font-bold shadow-lg pulse">
                Enable & Send
            </button>
        </div>

        <p class="mt-6 text-[10px] text-gray-400 font-medium">CLAYMORE SOLUTIONS | AVANTI OS</p>
    </div>

    <script>
        const btn = document.getElementById('main-btn');
        const statusText = document.getElementById('status-text');
        const input = document.getElementById('push-message');
        const iconBg = document.getElementById('icon-bg');

        // Initial UI State check
        if (Notification.permission === "granted") {
            setReadyUI();
        }

        async function handleEngine() {
            const text = input.value.trim();

            // 1. If permission isn't granted yet, we must ask first
            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    setReadyUI();
                    if (text) sendPush(text);
                } else {
                    statusText.innerText = "Permission Denied";
                    statusText.classList.replace('text-orange-500', 'text-red-500');
                }
                return;
            }

            // 2. If already granted, just send the message
            if (text) {
                sendPush(text);
            } else {
                alert("Please type a message to dispatch.");
            }
        }

        function sendPush(msg) {
            new Notification("Avanti Intelligence", {
                body: msg,
                icon: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                badge: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                silent: false
            });
            input.value = ""; // Reset
        }

        function setReadyUI() {
            statusText.innerText = "Engine Online";
            statusText.classList.replace('text-orange-500', 'text-green-500');
            btn.innerText = "Dispatch Notification";
            btn.classList.remove('pulse');
            iconBg.classList.replace('bg-[#3f72af]', 'bg-green-500');
        }
    </script>
</body>
</html>

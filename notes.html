<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanti | Notification Engine</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'SF Pro Display', sans-serif;
            background: #f2f2f7;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            border: 1px solid rgba(255, 255, 255, 0.4);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            width: 100%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .avanti-btn {
            background-color: #3f72af;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .avanti-btn:active { transform: scale(0.97); }
    </style>
</head>
<body>

    <div class="glass-card text-center">
        <div class="w-16 h-16 bg-[#3f72af] rounded-2xl mx-auto mb-6 flex items-center justify-center shadow-lg shadow-blue-200">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
            </svg>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-2">Push Engine</h1>
        <p class="text-sm text-gray-400 mb-8 uppercase tracking-widest font-medium">Real-Time Dispatch System</p>

        <div class="text-left space-y-4">
            <div>
                <label class="text-xs font-bold text-gray-400 ml-1">CONTENT</label>
                <input type="text" id="pushInput" placeholder="Enter message..." 
                    class="w-full mt-1 px-4 py-4 rounded-xl bg-gray-100 border-none focus:ring-2 focus:ring-[#3f72af] outline-none text-gray-800">
            </div>
            
            <button onclick="dispatchNotification()" class="avanti-btn w-full py-4 rounded-xl text-white font-bold shadow-lg shadow-blue-100">
                Trigger Notification
            </button>
        </div>

        <div id="statusBox" class="mt-6 text-xs font-medium py-2 px-4 rounded-full inline-block">
            Checking Permissions...
        </div>
    </div>

    <script>
        const statusBox = document.getElementById('statusBox');

        // 1. REGISTER THE SERVICE WORKER (Modern Standard)
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                const blob = new Blob([`
                    self.addEventListener('push', (event) => {
                        const data = event.data.json();
                        self.registration.showNotification(data.title, {
                            body: data.body,
                            icon: 'https://cdn-icons-png.flaticon.com/512/1042/1042339.png'
                        });
                    });
                `], { type: 'application/javascript' });
                
                const workerUrl = URL.createObjectURL(blob);
                navigator.serviceWorker.register(workerUrl).then(() => {
                    updateStatus("System Ready", "#34c759", "#e8f9ee");
                });
            });
        }

        // 2. REQUEST PERMISSION
        async function requestPermission() {
            const permission = await Notification.requestPermission();
            if (permission === 'granted') {
                updateStatus("Permission Granted", "#34c759", "#e8f9ee");
            } else {
                updateStatus("Permission Denied", "#ff3b30", "#fde8e8");
            }
        }

        // 3. THE DISPATCH ENGINE
        async function dispatchNotification() {
            const msg = document.getElementById('pushInput').value;
            
            if (!msg) {
                alert("Please write something first.");
                return;
            }

            if (Notification.permission !== 'granted') {
                await requestPermission();
            }

            if (Notification.permission === 'granted') {
                // Triggering a 'Real' Local Push via Service Worker registration
                const registration = await navigator.serviceWorker.ready;
                registration.showNotification("Avanti Intelligence", {
                    body: msg,
                    icon: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                    badge: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                    vibrate: [200, 100, 200],
                    tag: 'avanti-engine'
                });
                
                document.getElementById('pushInput').value = "";
            }
        }

        function updateStatus(text, color, bg) {
            statusBox.innerText = text;
            statusBox.style.color = color;
            statusBox.style.backgroundColor = bg;
        }

        // Initial check
        if (Notification.permission === 'granted') {
            updateStatus("System Ready", "#34c759", "#e8f9ee");
        } else {
            updateStatus("Action Required: Grant Permission", "#ff9500", "#fff4e5");
        }
    </script>
</body>
</html>

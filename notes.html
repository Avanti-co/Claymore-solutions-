<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avanti | Claymore Push OS</title>
    <link rel="stylesheet" href="https://fonts.cdnfonts.com/css/sf-pro-display">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'SF Pro Display', sans-serif;
            background: #f2f2f7; /* iOS Gray */
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 20px 50px rgba(0,0,0,0.08);
            width: 90%;
            max-width: 400px;
            padding: 2.5rem;
        }
        .btn-avanti {
            background-color: #3f72af;
            color: white;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .btn-avanti:active { transform: scale(0.96); }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="flex items-center justify-between mb-8">
            <div class="flex items-center space-x-2">
                <div id="status-dot" class="status-dot bg-orange-500"></div>
                <span id="status-text" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">Engine Offline</span>
            </div>
            <div class="w-10 h-10 bg-[#3f72af] rounded-xl flex items-center justify-center shadow-md">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
                </svg>
            </div>
        </div>

        <h1 class="text-2xl font-bold text-gray-900 mb-6">Push Dispatcher</h1>

        <div class="space-y-4">
            <div class="relative">
                <label class="text-[11px] font-bold text-gray-400 uppercase absolute -top-2 left-4 bg-[#fbfbfd] px-1">Message Content</label>
                <input type="text" id="pushInput" placeholder="Enter notification text..." 
                    class="w-full pt-5 pb-4 px-5 rounded-2xl bg-transparent border-2 border-gray-200 focus:border-[#3f72af] outline-none text-gray-800 transition-all">
            </div>

            <button onclick="runEngine()" id="mainBtn" class="btn-avanti w-full py-4 rounded-2xl font-bold text-lg shadow-xl shadow-blue-100">
                Activate Engine
            </button>
        </div>

        <p class="mt-8 text-center text-[10px] text-gray-300 font-medium tracking-widest">CLAYMORE SOLUTIONS | SECURE API</p>
    </div>

    <script>
        const btn = document.getElementById('mainBtn');
        const statusText = document.getElementById('status-text');
        const statusDot = document.getElementById('status-dot');
        const input = document.getElementById('pushInput');

        // Check permission state on load
        if (Notification.permission === "granted") {
            setReady();
        }

        async function runEngine() {
            const message = input.value.trim();

            // STEP 1: If we don't have permission, we must ask.
            if (Notification.permission !== "granted") {
                const permission = await Notification.requestPermission();
                if (permission === "granted") {
                    setReady();
                    if (message) sendAlert(message);
                } else {
                    statusText.innerText = "Permission Denied";
                    statusDot.className = "status-dot bg-red-500";
                }
                return;
            }

            // STEP 2: If we have permission, send the message
            if (message) {
                sendAlert(message);
            } else {
                alert("Please enter a message to push.");
            }
        }

        function sendAlert(text) {
            new Notification("Claymore Alert", {
                body: text,
                icon: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                badge: "https://via.placeholder.com/128/3f72af/ffffff?text=A",
                tag: 'avanti-push'
            });
            input.value = ""; // Clear input
        }

        function setReady() {
            statusText.innerText = "Engine Online";
            statusDot.className = "status-dot bg-green-500 shadow-[0_0_8px_rgba(34,197,94,0.6)]";
            btn.innerText = "Dispatch Push";
        }
    </script>
</body>
</html>
